[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.25"
optimizer = true
optimizer_runs = 200
gas_reports = ["HarborRedeemer"]
allow_paths = ["../node_modules"]
remappings = [
  "@flarenetwork/flare-periphery-contracts/=../node_modules/@flarenetwork/flare-periphery-contracts/",
  "@openzeppelin/contracts/=../node_modules/@openzeppelin/contracts/",
]
